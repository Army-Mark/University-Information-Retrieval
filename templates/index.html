<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校信息查询</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 登录弹窗 -->
    <div class="modal-overlay" id="loginModal">
        <div class="login-modal">
            <div class="modal-title">用户登录</div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <div class="error-message" id="errorMessage"></div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" onclick="hideLoginModal()">取消</button>
                <button class="modal-btn modal-btn-primary" onclick="doLogin()">登录</button>
            </div>
        </div>
    </div>
    
    <div class="card">
        <div class="header-row">
            <h1 onclick="window.location.href='/'" style="cursor: pointer;">高校信息查询</h1>
            <div class="login-area" id="loginContainer">
                <button class="login-btn" id="loginBtn" onclick="showLoginModal()">登录</button>
            </div>
        </div>
        
        <div class="search-row">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="请输入学校名称搜索..." autocomplete="off">
                <div id="suggestions"></div>
            </div>
            <button id="search-btn">搜索</button>
        </div>
        
        <!-- 滚动数据区域 -->
        <div class="scrolling-container" id="scrollingContainer">
            <div class="scrolling-header">
                <div class="scrolling-cell id">学校ID</div>
                <div class="scrolling-cell name">学校名称</div>
                <div class="scrolling-cell">地址</div>
                <div class="scrolling-cell">类别</div>
                <div class="scrolling-cell">性质</div>
            </div>
            <div class="scrolling-content" id="scrollingContent"></div>
        </div>
    </div>
    
    <script src="/static/js/script.js" defer></script>
</body>
</html>
