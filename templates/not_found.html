<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未找到</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .error-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .error-title {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: 600;
        }
        
        .error-message {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .error-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .error-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .error-container {
                padding: 30px 25px;
                margin: 20px;
            }
            
            .error-title {
                font-size: 24px;
            }
            
            .error-icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">😕</div>
        <h1 class="error-title">未找到该院校</h1>
        <p class="error-message">抱歉，您查找的院校不存在或已被删除。</p>
        <a href="/" class="error-btn">返回首页</a>
    </div>
</body>
</html>
